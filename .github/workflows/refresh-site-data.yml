name: Refresh dashboard data

on:
  workflow_dispatch: {}
  push:
    branches: [main]
    paths:
      - 'analysis/Data/monthly/**'
      - 'analysis/EDA.py'
      - 'analysis/parquet_fallback.py'
  # schedule:
  #   - cron: '0 6 1 * *'  

permissions:
  contents: write  
  pages: write
  id-token: write

concurrency:
  group: refresh-dashboard-data
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: analysis/requirements.txt

      - name: Install dependencies
        run: pip install -r analysis/requirements.txt

      - name: Run EDA.py
        working-directory: analysis
        env:
          SITE_DIR: ../docs   # matches the site/ -> docs/ rename for Pages
        run: python EDA.py

      - name: Upload full report as a build artifact
        uses: actions/upload-artifact@v4
        with:
          name: analysis-report
          path: analysis/Data/Global_Summary/
          if-no-files-found: warn

      - name: Commit refreshed dashboard data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/data.json docs/insights.json docs/assets/insights/
          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "Refresh dashboard data [automated]"
            git push
          fi

  deploy-pages:
    needs: refresh
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Check out repo (post-refresh)
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Set up Pages
        uses: actions/configure-pages@v5

      - name: Upload docs/ as the Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
